[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "variant-viewer"
version = "0.1.0"
description = "Interactive variant effect viewer for Evo2 ClinVar probes"
requires-python = ">=3.12"

dependencies = [
    "polars~=1.36",
    "torch",
    "orjson",
    "numpy",
    "scikit-learn>=1.8",
    "umap-learn",
    "loguru>=0.7",
    "tqdm>=4.66",
    "goodfire-core",
]

[project.optional-dependencies]
interpret = ["anthropic"]

[tool.ruff]
line-length = 120
